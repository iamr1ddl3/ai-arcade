name: Deploy to Cloudflare Pages

# Auto-deploy on push to main (code changes here), and on demand.
# Content (content.json) is pulled from the PRIVATE ai-arcade-content repo at build
# time — it is never stored in this public repo. See DEPLOY.md.
#
# Security note: no untrusted github.event.* input is interpolated into run: steps;
# all run: commands are static, and credentials are passed only via secrets in with:.
on:
  push:
    branches: [main]
    paths:                      # only redeploy when deployable assets change
      - 'arcade/index.html'
      - 'arcade/app.js'
      - 'arcade/styles.css'
      - 'arcade/_headers'
      - 'arcade/favicon.ico'
      - 'arcade/assets/**'
      - 'arcade/generate_content.py'
      - 'arcade/transform_content.py'
      - 'arcade/test_generate_content.py'
      - 'arcade/test_transform_content.py'
      - 'arcade/test_app.mjs'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:            # manual "Run workflow" button (e.g. after a content push)

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Python — generator + transform invariants (stdlib unittest)
        run: |
          python3 arcade/test_generate_content.py
          python3 arcade/test_transform_content.py
      - name: Node — app.js state logic (node:test, no deps)
        run: node --test arcade/test_app.mjs

  deploy:
    needs: test               # a broken generator never reaches Cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app shell (public repo)
        uses: actions/checkout@v4

      - name: Pull content.json from private content repo
        uses: actions/checkout@v4
        with:
          repository: iamr1ddl3/ai-arcade-content
          token: ${{ secrets.CONTENT_REPO_TOKEN }}
          path: _content

      - name: Assemble deploy bundle (static app shell + assets + content)
        run: |
          mkdir -p dist/data dist/assets
          cp arcade/index.html arcade/app.js arcade/styles.css arcade/_headers arcade/favicon.ico dist/
          cp arcade/assets/*.png dist/assets/
          cp _content/content.json dist/data/content.json
          echo "Bundle contents:" && find dist -type f | sort
          # Fail fast if content is missing/empty (guards against an empty-app deploy)
          test -s dist/data/content.json || { echo "ERROR: content.json missing/empty"; exit 1; }
          # Guard: logo mark must be present (a broken brand image ships silently otherwise)
          test -s dist/assets/logo-mark.png || { echo "ERROR: logo assets missing"; exit 1; }

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name ai-arcade --branch main
